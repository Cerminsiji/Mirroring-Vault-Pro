<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans">
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-100">
                <h1 class="text-2xl font-black mb-6 text-slate-900 flex items-center">
                    <i class="fas fa-vault mr-3 text-blue-600"></i> Mirroring Vault Pro
                </h1>
                <div class="space-y-4">
                    <input type="text" id="targetUrl" placeholder="URL Target" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 ring-blue-500 transition">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="folderName" placeholder="Folder" class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                        <input type="text" id="fileTypes" placeholder="iso, img, zip" class="p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                    </div>
                    <button onclick="start()" id="btnStart" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition">
                        DOWNLOAD
                    </button>
                    <div id="controlPanel" class="hidden space-y-3 pt-2">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="togglePause()" id="btnPause" class="bg-amber-500 text-white font-bold py-3 rounded-xl flex items-center justify-center"><i class="fas fa-pause mr-2"></i>PAUSE</button>
                            <button onclick="cancel()" id="btnCancel" class="bg-rose-500 text-white font-bold py-3 rounded-xl flex items-center justify-center"><i class="fas fa-stop mr-2"></i>CANCEL</button>
                        </div>
                        <button onclick="kickstart()" class="w-full bg-slate-800 text-slate-400 text-[10px] py-2 rounded-xl font-black tracking-widest uppercase italic"><i class="fas fa-bolt mr-1"></i> Force Kickstart</button>
                    </div>
                </div>
            </div>
            <div class="bg-slate-900 text-white p-8 rounded-[2rem] shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <span id="statusLabel" class="px-3 py-1 bg-slate-800 text-blue-400 rounded-full text-[10px] font-black uppercase tracking-widest">Idle</span>
                    <h2 id="percLabel" class="text-4xl font-black text-white">0%</h2>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-4 overflow-hidden">
                    <div id="progressBar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <div class="grid grid-cols-2 mt-6 pt-4 border-t border-slate-800 text-center">
                    <div class="border-r border-slate-800"><p class="text-[10px] text-slate-500 font-bold uppercase">Total</p><p id="statTotal" class="text-xl font-bold">0</p></div>
                    <div><p class="text-[10px] text-slate-500 font-bold uppercase">Sisa</p><p id="statQueue" class="text-xl font-bold">0</p></div>
                </div>
            </div>
        </div>
        <div class="lg:col-span-7 bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-100 flex flex-col">
            <h3 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Monitor Aktivitas</h3>
            <div id="logBox" class="bg-slate-950 rounded-2xl p-6 text-[11px] font-mono text-slate-400 space-y-2 h-[500px] overflow-y-auto border border-slate-900 shadow-inner">
                // Menunggu inisialisasi perintah...
            </div>
        </div>
    </div>

    <script>
        let poller;
        let isPaused = false;
        const scriptUrl = "<?= ScriptApp.getService().getUrl() ?>";

        function start() {
            const data = {
                targetUrl: document.getElementById('targetUrl').value,
                folderName: document.getElementById('folderName').value,
                fileTypes: document.getElementById('fileTypes').value
            };
            const btn = document.getElementById('btnStart');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-sync fa-spin mr-2"></i>MENGHUBUNGKAN...';
            
            google.script.run.withSuccessHandler((res) => {
                if(res === "OK") {
                    document.getElementById('controlPanel').classList.remove('hidden');
                    if (poller) clearInterval(poller);
                    poller = setInterval(updateUI, 3000);
                } else {
                    alert(res);
                    btn.disabled = false;
                    btn.innerText = 'DOWNLOAD';
                }
            }).startProcess(data);
        }

        function togglePause() {
            const btn = document.getElementById('btnPause');
            const targetStatus = isPaused ? 'RUNNING' : 'PAUSED';
            btn.disabled = true;
            google.script.run.withSuccessHandler((s) => {
                isPaused = (s === 'PAUSED');
                btn.disabled = false;
                btn.innerHTML = isPaused ? '<i class="fas fa-play mr-2"></i>RESUME' : '<i class="fas fa-pause mr-2"></i>PAUSE';
                btn.className = isPaused ? "bg-emerald-500 text-white font-bold py-3 rounded-xl transition flex items-center justify-center" : "bg-amber-500 text-white font-bold py-3 rounded-xl transition flex items-center justify-center";
            }).setStatus(targetStatus);
        }

        function cancel() {
            if(!confirm("Hentikan semua proses?")) return;
            const btn = document.getElementById('btnCancel');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            google.script.run.withSuccessHandler(() => {
                setTimeout(() => { location.reload(); }, 500);
            }).setStatus('CANCELLED');
        }

        function kickstart() { google.script.run.manualKick(); }

        function updateUI() {
            google.script.run.withSuccessHandler(res => {
                const btn = document.getElementById('btnStart');
                document.getElementById('statusLabel').innerText = res.status;
                document.getElementById('statTotal').innerText = res.total;
                document.getElementById('statQueue').innerText = res.queueCount;

                if(res.status === 'RUNNING' && res.total > 0) {
                    btn.innerHTML = '<i class="fas fa-sync-alt fa-spin mr-2"></i>PROSES DOWNLOAD';
                    btn.className = "w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg";
                }

                const progress = res.total > 0 ? Math.round(((res.total - res.queueCount) / res.total) * 100) : 0;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('percLabel').innerText = progress + '%';

                if (res.logs.length > 0) {
                    document.getElementById('logBox').innerHTML = res.logs.slice().reverse().map(l => {
                        let color = l.includes('✅') ? 'text-emerald-400' : (l.includes('⚠️') ? 'text-amber-400' : 'text-rose-400');
                        return `<div class="${color} border-b border-slate-900 pb-1 font-medium">${l}</div>`;
                    }).join('');
                }

                if (res.status === 'FINISHED') {
                    clearInterval(poller);
                    btn.disabled = false;
                    btn.innerText = 'SINKRONISASI SELESAI';
                    btn.className = "w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg";
                }
            }).getProgress();
        }
    </script>
</body>
</html>
