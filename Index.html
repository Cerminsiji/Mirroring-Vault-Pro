<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 p-4 md:p-10 font-sans">
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
                <h1 class="text-2xl font-black mb-6 text-slate-900 tracking-tight flex items-center">
                    <i class="fas fa-vault mr-3 text-blue-600"></i> Mirroring Vault Pro
                </h1>
                
                <div class="space-y-4">
                    <input type="text" id="targetUrl" placeholder="URL Target" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="folderName" placeholder="Folder" class="p-4 bg-slate-50 border rounded-2xl outline-none">
                        <input type="text" id="fileTypes" placeholder="pdf, zip" class="p-4 bg-slate-50 border rounded-2xl outline-none">
                    </div>
                    
                    <button onclick="start()" id="btnStart" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition">
                        DOWNLOAD
                    </button>

                    <div id="controlPanel" class="hidden space-y-2">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="togglePause()" id="btnPause" class="bg-amber-500 text-white font-bold py-3 rounded-xl transition flex items-center justify-center">
                                <i class="fas fa-pause mr-2"></i>PAUSE
                            </button>
                            <button onclick="cancel()" id="btnCancel" class="bg-rose-500 text-white font-bold py-3 rounded-xl transition flex items-center justify-center">
                                <i class="fas fa-stop mr-2"></i>CANCEL
                            </button>
                        </div>
                        <button onclick="kickstart()" class="w-full bg-slate-800 text-slate-300 text-[10px] py-1 rounded-lg hover:text-white transition">
                            <i class="fas fa-bolt mr-1"></i> FORCE KICKSTART (Gunakan jika macet)
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 text-white p-8 rounded-3xl shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <span id="statusLabel" class="px-3 py-1 bg-slate-800 text-blue-400 rounded-full text-[10px] font-black uppercase tracking-widest">Idle</span>
                    <h2 id="percLabel" class="text-3xl font-black">0%</h2>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden">
                    <div id="progressBar" class="bg-blue-500 h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 bg-white p-8 rounded-3xl shadow-xl border border-slate-200 flex flex-col">
            <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Log Aktivitas</h3>
            <div id="logBox" class="bg-slate-900 rounded-2xl p-6 text-[11px] font-mono text-slate-400 space-y-2 h-[450px] overflow-y-auto">
                // Menunggu inisialisasi...
            </div>
        </div>
    </div>

    <script>
        let poller;
        let isPaused = false;

        function start() {
            const data = {
                targetUrl: document.getElementById('targetUrl').value,
                folderName: document.getElementById('folderName').value,
                fileTypes: document.getElementById('fileTypes').value
            };
            const btn = document.getElementById('btnStart');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-cog fa-spin mr-2"></i>MENCARI LINK...';
            
            google.script.run.withSuccessHandler((res) => {
                document.getElementById('controlPanel').classList.remove('hidden');
                if (poller) clearInterval(poller);
                poller = setInterval(updateUI, 3000);
            }).startProcess(data);
        }

        function togglePause() {
            const btn = document.getElementById('btnPause');
            const newStatus = isPaused ? 'RUNNING' : 'PAUSED';
            
            google.script.run.withSuccessHandler((s) => {
                isPaused = (s === 'PAUSED');
                btn.innerHTML = isPaused ? '<i class="fas fa-play mr-2"></i>RESUME' : '<i class="fas fa-pause mr-2"></i>PAUSE';
                btn.className = isPaused ? "bg-emerald-500 text-white font-bold py-3 rounded-xl transition flex items-center justify-center" : "bg-amber-500 text-white font-bold py-3 rounded-xl transition flex items-center justify-center";
            }).setStatus(newStatus);
        }

        function kickstart() {
            google.script.run.withSuccessHandler(m => console.log(m)).manualKick();
        }

        function cancel() {
            if(confirm("Batalkan?")) google.script.run.withSuccessHandler(() => location.reload()).setStatus('CANCELLED');
        }

        function updateUI() {
            google.script.run.withSuccessHandler(res => {
                const btn = document.getElementById('btnStart');
                const statusLabel = document.getElementById('statusLabel');
                
                statusLabel.innerText = res.status;
                
                // Ganti Nama Button Saat Mendownload
                if(res.status === 'RUNNING' && res.total > 0) {
                    btn.innerHTML = '<i class="fas fa-sync-alt fa-spin mr-2"></i>PROSES DOWNLOAD';
                    btn.className = "w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg transition";
                }

                const progress = res.total > 0 ? Math.round(((res.total - res.queueCount) / res.total) * 100) : 0;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('percLabel').innerText = progress + '%';

                if (res.logs.length > 0) {
                    document.getElementById('logBox').innerHTML = res.logs.slice().reverse().map(l => {
                        let color = l.includes('✅') ? 'text-emerald-400' : 'text-slate-400';
                        return `<div class="${color} border-b border-slate-800 pb-1 font-medium">${l}</div>`;
                    }).join('');
                }

                if (res.status === 'FINISHED') {
                    clearInterval(poller);
                    btn.disabled = false;
                    btn.innerText = 'SELESAI';
                    btn.className = "w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg transition";
                }
            }).getProgress();
        }
    </script>
</body>
</html>
